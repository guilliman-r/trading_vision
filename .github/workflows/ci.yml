name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Format
        run: ruff format --check .
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest

