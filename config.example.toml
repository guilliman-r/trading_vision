# Copy this file to config.toml to override these defaults.

[app]
# Keep this on 127.0.0.1 for normal local use. Binding to 0.0.0.0 exposes the unauthenticated app
# to other devices on your network and will print a startup warning.
host = "127.0.0.1"
port = 8050
debug = false
timezone = "Europe/Istanbul"
default_symbol = "THYAO.IS"
default_interval = "1d"
chart_candle_limit = 500

[storage]
database_path = "var/trading_vision.sqlite3"

[provider]
# Reuse identical UI chart loads briefly; the Refresh button always bypasses this.
cooldown_seconds = 30

[scanner]
# Start conservatively. Add "1h" after measuring provider throughput for your universe.
intervals = ["1d"]
batch_size = 25
lookback_bars = 500
provider_delay_seconds = 60
lock_path = "var/scanner.lock"

[alerts]
minimum_score = 70
# The more ambiguous detectors stay excluded until frozen real examples are reviewed.
enabled_pattern_types = ["resistance_breakout", "support_breakdown"]
